name: Build & Deploy to Raspberry Pi

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

env:
  N8N_CONTAINER: ${{ secrets.PI_N8N_CONTAINER_NAME || 'n8n' }}

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Package tarball
        run: npm pack

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: n8n-nodes-kusto-package
          path: n8n-nodes-kusto-*.tgz
          retention-days: 30

  deploy:
    name: Deploy to Raspberry Pi
    needs: build
    runs-on: ubuntu-latest
    # Only deploy on push to main (not on PRs)
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Download tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: n8n-nodes-kusto-package

      - name: Get tarball filename
        id: tarball
        run: echo "filename=$(ls n8n-nodes-kusto-*.tgz)" >> "$GITHUB_OUTPUT"

      - name: Copy tarball to Raspberry Pi
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          port: ${{ secrets.PI_SSH_PORT || '22' }}
          source: ${{ steps.tarball.outputs.filename }}
          target: /tmp/

      - name: Install into n8n container and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          port: ${{ secrets.PI_SSH_PORT || '22' }}
          script: |
            CONTAINER="${{ secrets.PI_N8N_CONTAINER_NAME }}"
            CONTAINER="${CONTAINER:-n8n}"
            TARBALL="/tmp/${{ steps.tarball.outputs.filename }}"

            echo "==> Copying tarball into container: $CONTAINER"
            docker cp "$TARBALL" "$CONTAINER":/tmp/n8n-nodes-kusto.tgz

            echo "==> Installing package inside container"
            docker exec "$CONTAINER" sh -c "cd /home/node/.n8n && npm install /tmp/n8n-nodes-kusto.tgz --save"

            echo "==> Cleaning up tarball inside container"
            docker exec "$CONTAINER" rm -f /tmp/n8n-nodes-kusto.tgz

            echo "==> Restarting n8n container"
            docker restart "$CONTAINER"

            echo "==> Cleaning up tarball on host"
            rm -f "$TARBALL"

            echo "==> Deployment complete!"
